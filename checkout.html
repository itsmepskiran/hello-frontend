<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — HelloBMG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Hello<span>BMG</span></a>
      <div class="checkout-secure">
        🔒 Secure Checkout
      </div>
    </div>
  </header>

  <!-- Empty cart state -->
  <div id="emptyCartState" class="empty-checkout" style="display:none">
    <div class="empty-icon">🛒</div>
    <h2>Your cart is empty</h2>
    <p>Add some products before checking out.</p>
    <a href="index.html" class="btn-primary">Shop Now →</a>
  </div>

  <main id="checkoutMain" class="checkout-page">
    <div class="container">
      <div class="checkout-breadcrumb">
        <a href="index.html">← Back to Shop</a>
      </div>
      <h1 class="checkout-title">Checkout</h1>

      <div class="checkout-grid">
        <!-- Left: Customer form -->
        <section class="checkout-form-section">
          <div class="form-card">
            <h2 class="form-section-title">Contact Information</h2>
            <form id="checkoutForm" novalidate>
              <div class="form-row">
                <div class="form-group">
                  <label for="custName">Full Name <span class="req">*</span></label>
                  <input type="text" id="custName" placeholder="John Doe" autocomplete="name" required />
                </div>
                <div class="form-group">
                  <label for="custPhone">Phone <span class="req">*</span></label>
                  <input type="tel" id="custPhone" placeholder="+91 99999 99999" autocomplete="tel" required />
                </div>
              </div>
              <div class="form-group">
                <label for="custEmail">Email Address <span class="req">*</span></label>
                <input type="email" id="custEmail" placeholder="john@example.com" autocomplete="email" required />
              </div>

              <h2 class="form-section-title" style="margin-top:28px">Delivery Address <span style="font-size:.8rem;color:var(--muted);font-weight:400">(optional)</span></h2>
              <div class="form-group">
                <label for="custAddress">Street Address</label>
                <input type="text" id="custAddress" placeholder="123, Main Street, Apt 4B" autocomplete="street-address" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="custCity">City</label>
                  <input type="text" id="custCity" placeholder="Mumbai" autocomplete="address-level2" />
                </div>
                <div class="form-group">
                  <label for="custState">State</label>
                  <input type="text" id="custState" placeholder="Maharashtra" autocomplete="address-level1" />
                </div>
              </div>
              <div class="form-group" style="max-width:200px">
                <label for="custPin">PIN Code</label>
                <input type="text" id="custPin" placeholder="400001" autocomplete="postal-code" maxlength="6" />
              </div>
            </form>
          </div>
        </section>

        <!-- Right: Order summary -->
        <aside class="order-summary-section">
          <div class="order-summary-card">
            <h2 class="form-section-title">Order Summary</h2>
            <div id="orderItemsList" class="order-items-list"></div>

            <div class="order-totals">
              <div class="total-row">
                <span>Subtotal</span>
                <span id="checkoutSubtotal">₹0</span>
              </div>
              <div class="total-row">
                <span>Shipping</span>
                <span class="free-text">Free</span>
              </div>
              <div class="total-divider"></div>
              <div class="total-row total-final">
                <span>Total</span>
                <span id="checkoutTotal">₹0</span>
              </div>
            </div>

            <button id="payNowBtn" class="btn-primary pay-btn">
              <span>Pay Now</span>
              <span id="payBtnAmount"></span>
              <span>→</span>
            </button>

            <p class="secure-badge">🔒 Secured by Razorpay · 100% Safe</p>
            <div class="payment-methods">
              <span>UPI</span>
              <span>Credit Card</span>
              <span>Net Banking</span>
              <span>Wallets</span>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module" src="checkout.js"></script>
</body>
</html>
